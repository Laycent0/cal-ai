<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
  <title>Cal AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet"/>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ── ONBOARDING ──────────────────────────────────────────── -->
<div id="screen-ob">
  <div class="ob-header">
    <button class="ob-back hidden" id="ob-back">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
    </button>
    <div class="ob-prog-wrap"><div class="ob-prog" id="ob-prog"></div></div>
  </div>
  <div class="ob-body" id="ob-body"></div>
  <div class="ob-footer">
    <button class="btn-main" id="ob-next">Далее →</button>
  </div>
</div>

<!-- ── MAIN APP ────────────────────────────────────────────── -->
<div id="screen-app" class="hidden">
  <!-- Panels -->
  <div class="panel active" id="panel-home"></div>
  <div class="panel"        id="panel-analyze"></div>
  <div class="panel"        id="panel-profile"></div>

  <!-- Bottom Nav (3 вкладки) -->
  <nav class="bot-nav">
    <button class="nav-btn active" data-tab="home">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
      <span>Главная</span>
    </button>
    <button class="nav-btn" data-tab="analyze">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
      <span>Анализ</span>
    </button>
    <button class="nav-btn" data-tab="profile">
      <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
      <span>Профиль</span>
    </button>
  </nav>
</div>

<!-- ── MODAL: Ручное добавление блюда ─────────────────────── -->
<div class="modal-overlay hidden" id="modal-add">
  <div class="modal-card">
    <div class="modal-header">
      <div class="modal-title">Добавить блюдо</div>
      <button class="modal-close" id="modal-close">✕</button>
    </div>
    <div class="modal-body">
      <label class="form-label">Название</label>
      <input class="form-input" id="m-name" placeholder="Например: Гречка с курицей" type="text"/>
      <label class="form-label">Калории</label>
      <input class="form-input" id="m-cal" placeholder="ккал" type="number" inputmode="numeric"/>
      <div class="form-row3">
        <div>
          <label class="form-label">Белки</label>
          <input class="form-input" id="m-p" placeholder="г" type="number" inputmode="decimal"/>
        </div>
        <div>
          <label class="form-label">Жиры</label>
          <input class="form-input" id="m-f" placeholder="г" type="number" inputmode="decimal"/>
        </div>
        <div>
          <label class="form-label">Углеводы</label>
          <input class="form-input" id="m-c" placeholder="г" type="number" inputmode="decimal"/>
        </div>
      </div>
      <label class="form-label">Приём пищи</label>
      <div class="meal-select-row" id="meal-select">
        <button class="meal-sel-btn selected" data-meal="breakfast">☕ Завтрак</button>
        <button class="meal-sel-btn" data-meal="lunch">🍱 Обед</button>
        <button class="meal-sel-btn" data-meal="dinner">🍽 Ужин</button>
        <button class="meal-sel-btn" data-meal="snack">🍎 Перекус</button>
      </div>
    </div>
    <button class="btn-main" id="modal-save" style="margin:0 20px 20px;">Добавить</button>
  </div>
</div>

<div class="toast hidden" id="toast"></div>
<input type="file" id="file-input" accept="image/*" hidden/>
<input type="file" id="cam-input"  accept="image/*" capture="environment" hidden/>

<script src="core.js"></script>
<script src="onboarding.js"></script>
<script src="app.js"></script>
</body>
</html>
